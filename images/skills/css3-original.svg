<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    @keyframes first {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #1572B6;
      }
    }

    @keyframes second {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #ffffff;
      }
    }

    #py-icon {
      fill: transparent;
    }
    .first-child {
      stroke: #1572B6;
      stroke-width: 2px;
      animation: first 5s linear forwards;
      animation-iteration-count: infinite;
    }
    
    .last-child {
      stroke: #ffffff;
      stroke-width: 0px;
      animation: second 5s linear forwards;
      animation-iteration-count: infinite;
    }
  </style>
