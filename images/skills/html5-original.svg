<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    @keyframes first {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #E44D26;
      }
    }

    @keyframes second {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #F16529;
      }
    }

    @keyframes third {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #fff;
      }
    }

    #py-icon {
      fill: transparent;
    }
    .first-child {
      stroke: #E44D26;
      stroke-width: 2px;
      animation: first 5s linear forwards;
      animation-iteration-count: infinite;
    }
  
    .second-child {
      stroke: #F16529;
      stroke-width: 0px;
      animation: second 5s linear forwards;
      animation-iteration-count: infinite;
    }
    .third-child {
      stroke: #fff;
      stroke-width: 0px;
      animation: third 5s linear forwards;
      animation-iteration-count: infinite;
    }
  </style>

