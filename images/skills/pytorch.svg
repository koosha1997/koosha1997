
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     fill="none">

	  <style>
    @keyframes first {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #EE4C2C;
      }
    }

    @keyframes second {
      0% {
        stroke-dasharray: 0 1600;
      }
      50% {
        stroke-dasharray: 1600 1600;
      }
      50% {
        fill: transparent;
      }
      75%, 100% {
        fill: #EE4C2C;
      }
    }

    #py-icon {
      fill: transparent;
    }
    .first-child {
      stroke: #EE4C2C;
      stroke-width: 1px;
      animation: first 5s linear forwards;
      animation-iteration-count: infinite;
    }
    
    .last-child {
      stroke: #EE4C2C;
      stroke-width: 7px;
      animation: second 5s linear forwards;
      animation-iteration-count: infinite;
    }
  </style>

  <path
	class = "first-child"
    d="M63.1 27.4L56.5 34c10.8 10.8 10.8 28.2 0 38.8s-28.2 10.8-38.8 0-10.8-28.2 0-38.8l17.1-17.1 2.4-2.4V1.6L11.4 27.4C-3 41.8-3 65 11.4 79.4s37.6 14.4 52 0 14.4-37.6-.3-52z"
    stroke="#EE4C2C"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <circle
    cx="50.2"
    cy="20.9"
    r="4.8"
    fill="#EE4C2C"
    stroke-width="3"/>
</svg>
